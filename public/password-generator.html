    <script>
        // 生成随机密码的函数 
        function generatePasswords() {
            const includeLetters = document.getElementById("includeLetters").checked;
            const includeNumbers = document.getElementById("includeNumbers").checked;
            const includeSymbols = document.getElementById("includeSymbols").checked;
            const includeWords = document.getElementById("includeWords").checked;
            const passwordLength = parseInt(document.getElementById("passwordLength").value);
            const numPasswords = parseInt(document.getElementById("numPasswords").value);

            let charset = "";
            let passwords = "";

            if (includeLetters) {
                charset += "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
            }
            if (includeNumbers) {
                charset += "0123456789";
            }
            if (includeSymbols) {
                charset += "`~!@#$%^&-+=";
            }

            for (let p = 0; p < numPasswords; p++) {
                let password = "";

                if (includeWords && charset.length > 0 && passwordLength > 0) {
                    const randomLetter = String.fromCharCode(97 + Math.floor(Math.random() * 26)); // Random letter from 'a' to 'z'
                    const wordArray = eval(randomLetter + "_commonWords");
                    let randomWord = "";

                    // Find a word that fits the password length
                    for (let i = 0; i < wordArray.length; i++) {
                        if (wordArray[i].length <= passwordLength) {
                            randomWord = wordArray[i];
                            break;
                        }
                    }

                    const remainingLength = passwordLength - randomWord.length;
                    if (remainingLength > 0) {
                        for (let i = 0; i < remainingLength; i++) {
                            password += charset.charAt(Math.floor(Math.random() * charset.length));
                        }
                        password = randomWord.charAt(0).toUpperCase() + randomWord.slice(1) + password;
                    } else {
                        password = randomWord.charAt(0).toUpperCase() + randomWord.slice(1);
                    }

                    // Ensure two words are connected using a character or number
                    if (password.length > 2) {
                        const connectorIndex = Math.floor(Math.random() * (password.length - 1)) + 1;
                        const connector = charset.charAt(Math.floor(Math.random() * charset.length));
                        password = password.slice(0, connectorIndex) + connector + password.slice(connectorIndex);
                    }
                } else {
                    for (let i = 0; i < passwordLength; i++) {
                        password += charset.charAt(Math.floor(Math.random() * charset.length));
                    }
                }

                passwords += `<div class="alert alert-success mt-2">${password}</div>`;
            }

            document.getElementById("passwordBlocks").innerHTML = passwords;
        }

            <div class="form-check">
