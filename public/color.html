<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Color Schema</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <!--<link href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined" rel="stylesheet">-->
    <script src="https://code.jquery.com/jquery-2.2.4.min.js" integrity="sha256-BbhdlvQf/xTY9gja0Dq3HiwQF8LaCRTXxZKRutelT44=" crossorigin="anonymous"></script>
    <style type="text/css">
        * { font-size: 14px; font-family: Roboto, sans-serif; }
        .line { height: 30px; line-height: 30px; margin: 10px 0; }
        .title { font-weight: 500; display: inline-block; width: 60px; }
        #dvColor { width: 200px; height: 200px; border: solid 1px #e3e3e3; }
        </style>
    <script>
        $(function () {
            function displayColor() {
                var backgroundColor = $("#txtColor").val().trim();
                var opacity = parseFloat($("#txtOpacity").val().trim()) || 0;

                $("#dvColor").css({ backgroundColor: backgroundColor, opacity: opacity });
            }

            $("#txtColor,#txtOpacity").bind("input propertychange", displayColor);
            
            displayColor();
        });
    </script>
</head>

<body style="overflow: hidden; padding:10px;">
    <div class="line"><span class="title">Color: </span><input type="text" id="txtColor" value="purple"></div>
    <div class="line"><span class="title">Opacity: </span><input type="text" id="txtOpacity" value="0.25"></div>
    <div id="dvColor" style="margin-left: 60px;"></div>
</body>

</html>
