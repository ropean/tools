<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inline Assets Demo</title>
  
  <style>* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  padding: 20px;
}

.container {
  text-align: center;
  max-width: 600px;
  animation: fadeInUp 0.8s ease-out;
}

.badge {
  display: inline-block;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  color: white;
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 20px;
  animation: pulse 2s infinite;
}

.title {
  font-size: 48px;
  font-weight: 900;
  color: white;
  margin-bottom: 16px;
  text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
}

.description {
  font-size: 20px;
  color: rgba(255, 255, 255, 0.9);
  margin-bottom: 40px;
  line-height: 1.6;
}

.features {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.feature {
  background: white;
  color: #667eea;
  padding: 12px 24px;
  border-radius: 12px;
  font-weight: 600;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
  transition: transform 0.3s ease;
}

.feature:hover {
  transform: translateY(-4px);
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}</style>
</head>
<body>
  <div class="container">
    <div class="badge">✨ New</div>
    <h1 class="title">Welcome to Inline Assets</h1>
    <p class="description">Transform your HTML into self-contained files with zero dependencies</p>
    <div class="features">
      <div class="feature">🚀 Fast</div>
      <div class="feature">💎 Beautiful</div>
      <div class="feature">🎯 Simple</div>
    </div>
  </div>
  
  <script>console.log('🎉 Inline Assets Demo Loaded!');

document.addEventListener('DOMContentLoaded', () => {
  const features = document.querySelectorAll('.feature');
  
  features.forEach((feature, index) => {
    feature.style.animationDelay = `${index * 0.1}s`;
    feature.style.animation = 'fadeInUp 0.6s ease-out forwards';
  });
});</script>
</body>
</html>
