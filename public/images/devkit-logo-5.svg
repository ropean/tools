<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 无背景，透明，适合叠加使用 -->
  <defs>
    <linearGradient id="grad5a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="grad5b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- 工具箱外壳 -->
  <rect x="24" y="80" width="152" height="98" rx="14" fill="url(#grad5a)"/>
  <!-- 工具箱提手 -->
  <path d="M72 80 L72 60 Q72 44 100 44 Q128 44 128 60 L128 80" fill="none" stroke="url(#grad5a)" stroke-width="12" stroke-linecap="round"/>
  <!-- 工具箱锁扣横线 -->
  <rect x="24" y="112" width="152" height="14" rx="0" fill="#1d4ed8" opacity="0.4"/>
  <!-- 锁扣中心按钮 -->
  <rect x="82" y="106" width="36" height="26" rx="8" fill="url(#grad5b)"/>
  <circle cx="100" cy="119" r="6" fill="#1d4ed8"/>

  <!-- 工具图标：左侧螺丝刀 -->
  <g transform="translate(58, 148) rotate(-40)">
    <rect x="-3" y="-28" width="6" height="42" rx="3" fill="white" opacity="0.9"/>
    <polygon points="-5,-28 5,-28 8,-38 -8,-38" fill="white" opacity="0.9"/>
  </g>

  <!-- 工具图标：右侧扳手 -->
  <g transform="translate(142, 148) rotate(40)">
    <rect x="-3" y="-28" width="6" height="40" rx="3" fill="white" opacity="0.9"/>
    <circle cx="0" cy="-28" r="9" fill="none" stroke="white" stroke-width="5" opacity="0.9"/>
    <circle cx="0" cy="-28" r="3.5" fill="white" opacity="0.9"/>
  </g>
</svg>
