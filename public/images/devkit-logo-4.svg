<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- 圆角方形背景 -->
  <rect width="200" height="200" rx="44" fill="url(#bg4)"/>
  <rect width="200" height="100" rx="44" fill="url(#shine4)"/>

  <!-- 齿轮 (大) -->
  <g transform="translate(72, 80)">
    <circle cx="0" cy="0" r="24" fill="none" stroke="white" stroke-width="8"/>
    <circle cx="0" cy="0" r="9" fill="white"/>
    <!-- 齿牙 8个 -->
    <rect x="-5" y="-33" width="10" height="14" rx="3" fill="white"/>
    <rect x="-5" y="19" width="10" height="14" rx="3" fill="white"/>
    <rect x="19" y="-5" width="14" height="10" rx="3" fill="white"/>
    <rect x="-33" y="-5" width="14" height="10" rx="3" fill="white"/>
    <rect x="13.5" y="-27" width="10" height="14" rx="3" fill="white" transform="rotate(45,18.5,-20)"/>
    <rect x="-23.5" y="13" width="10" height="14" rx="3" fill="white" transform="rotate(45,-18.5,20)"/>
    <rect x="13.5" y="13" width="10" height="14" rx="3" fill="white" transform="rotate(-45,18.5,20)"/>
    <rect x="-23.5" y="-27" width="10" height="14" rx="3" fill="white" transform="rotate(-45,-18.5,-20)"/>
  </g>

  <!-- 齿轮 (小) -->
  <g transform="translate(128, 116)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="white" stroke-width="6" opacity="0.85"/>
    <circle cx="0" cy="0" r="6" fill="white" opacity="0.85"/>
    <rect x="-4" y="-22" width="8" height="10" rx="2.5" fill="white" opacity="0.85"/>
    <rect x="-4" y="12" width="8" height="10" rx="2.5" fill="white" opacity="0.85"/>
    <rect x="12" y="-4" width="10" height="8" rx="2.5" fill="white" opacity="0.85"/>
    <rect x="-22" y="-4" width="10" height="8" rx="2.5" fill="white" opacity="0.85"/>
  </g>

  <!-- 代码斜杠 -->
  <line x1="106" y1="50" x2="94" y2="164" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
</svg>
