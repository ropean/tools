<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      background-color: #f5f5f5;
    }
    .container {
      width: 80%;
      margin-top: 3rem;
      background-color: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    h2 {
      font-size: 28px;
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
    }
    .btn-primary {
      background-color: #007bff;
      border-color: #007bff;
    }
    .btn-primary:hover {
      background-color: #0056b3;
      border-color: #0056b3;
    }
  </style>
  <!--
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  -->
  <title>随机字符串生成工具</title>
  <script>
    function generateRandomString() {
      const uppercaseChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const lowercaseChars = "abcdefghijklmnopqrstuvwxyz";
      const numberChars = "0123456789";
      const specialChars = document.getElementById("chkSpeChar").checked ? "`~!@#$%^&-+=" : "";
      
      const includeUppercase = document.getElementById("chkCpaChar").checked;
      const includeLowercase = document.getElementById("chkLowChar").checked;
      const includeNumbers = document.getElementById("chkNum").checked;
      const includeSpecialChars = document.getElementById("chkSpeChar").checked;
      
      const totalChars = (includeUppercase ? uppercaseChars : "") + 
                        (includeLowercase ? lowercaseChars : "") +
                        (includeNumbers ? numberChars : "") +
                        specialChars;
      
      const stringLength = parseInt(document.getElementById("txtLen").value);
      const numStrings = parseInt(document.getElementById("txtNum").value);
      
      let result = "";
      for (let i = 0; i < numStrings; i++) {
        let randomString = "";
        for (let j = 0; j < stringLength; j++) {
          const randomIndex = Math.floor(Math.random() * totalChars.length);
          randomString += totalChars[randomIndex];
        }
        result += randomString + "\n";
      }
      
      document.getElementById("result").value = result;
    }
  </script>
</head>
<body>
  <div class="container">
    <div class="row">
      <div class="col-md-16 offset-md-2">
        <h2 class="text-center mb-4">随机字符串生成工具</h2>
        <div class="form-group">
          <label class="mr-3"><input type="checkbox" id="chkCpaChar" checked> 包含大写字母</label>
          <label class="mr-3"><input type="checkbox" id="chkLowChar" checked> 包含小写字母</label>
          <label class="mr-3"><input type="checkbox" id="chkNum" checked> 包含数字</label>
          <label><input type="checkbox" id="chkSpeChar"> 包含特殊符号</label>
          <input type="text" id="txtSpe" class="ml-2" placeholder="常见特殊符号" disabled>
        </div>
        <div class="form-group">
          <label>字符串长度：<input type="number" id="txtLen" value="16"></label>
          <label class="ml-3">生成数量：<input type="number" id="txtNum" value="1"></label>
        </div>
        <button class="btn btn-primary" id="btnGen" onclick="generateRandomString()">生成随机字符串</button>
        <div class="form-group mt-4">
          <label>生成的字符串：</label>
          <textarea id="result" class="form-control" rows="5" readonly></textarea>
        </div>
      </div>
    </div>
  </div>
  <script>
    function toggleSpecialChars() {
      const txtSpe = document.getElementById("txtSpe");
      txtSpe.disabled = !document.getElementById("chkSpeChar").checked;
    }
    toggleSpecialChars();
  </script>
</body>
</html>
