<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代码工具</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/js-beautify@1.13.5/js/lib/beautify.js"></script>
</head>
<body>

<div class="container mt-5">
  <h1 class="mb-4">代码工具</h1>
  <div class="mb-3">
    <label for="codeTextarea" class="form-label">粘贴您的代码：</label>
    <textarea class="form-control" id="codeTextarea" rows="6"></textarea>
  </div>
  <button class="btn btn-primary" id="compressHtmlButton">压缩HTML</button>
  <button class="btn btn-primary" id="formatHtmlButton">格式化HTML</button>
  <button class="btn btn-primary" id="compressCssButton">压缩CSS</button>
  <button class="btn btn-primary" id="formatCssButton">格式化CSS</button>
  <button class="btn btn-primary" id="compressJsButton">压缩JavaScript</button>
  <button class="btn btn-primary" id="formatJsButton">格式化JavaScript</button>
  <div class="mt-3">
    <label for="outputTextarea" class="form-label">处理后的代码：</label>
    <textarea class="form-control" id="outputTextarea" rows="6" readonly></textarea>
  </div>
</div>

<script>
  document.getElementById("compressHtmlButton").addEventListener("click", function() {
    const codeTextarea = document.getElementById("codeTextarea");
    const outputTextarea = document.getElementById("outputTextarea");

    const originalCode = codeTextarea.value;
    const compressedCode = originalCode.replace(/\s+/g, " ").trim();

    outputTextarea.value = compressedCode;
  });

  document.getElementById("formatHtmlButton").addEventListener("click", function() {
    const codeTextarea = document.getElementById("codeTextarea");
    const outputTextarea = document.getElementById("outputTextarea");

    const originalCode = codeTextarea.value;
    const formattedCode = formatHtml(originalCode);

    outputTextarea.value = formattedCode;
  });

  document.getElementById("compressCssButton").addEventListener("click", function() {
    const codeTextarea = document.getElementById("codeTextarea");
    const outputTextarea = document.getElementById("outputTextarea");

    const originalCode = codeTextarea.value;
    const compressedCode = originalCode.replace(/\s+/g, " ").trim();

    outputTextarea.value = compressedCode;
  });

  document.getElementById("formatCssButton").addEventListener("click", function() {
    const codeTextarea = document.getElementById("codeTextarea");
    const outputTextarea = document.getElementById("outputTextarea");

    const originalCode = codeTextarea.value;
    const formattedCode = formatCss(originalCode);

    outputTextarea.value = formattedCode;
  });

  document.getElementById("compressJsButton").addEventListener("click", function() {
    const codeTextarea = document.getElementById("codeTextarea");
    const outputTextarea = document.getElementById("outputTextarea");

    const originalCode = codeTextarea.value;
    const compressedCode = uglifyJs(originalCode);

    outputTextarea.value = compressedCode;
  });

  document.getElementById("formatJsButton").addEventListener("click", function() {
    const codeTextarea = document.getElementById("codeTextarea");
    const outputTextarea = document.getElementById("outputTextarea");

    const originalCode = codeTextarea.value;
    const formattedCode = js_beautify(originalCode);

    outputTextarea.value = formattedCode;
  });

  function formatHtml(inputHtml) {
    const lines = inputHtml.split("\n");
    let indentLevel = 0;
    let formattedHtml = "";

    for (const line of lines) {
      const trimmedLine = line.trim();
      if (trimmedLine.startsWith("</")) {
        indentLevel--;
      }

      formattedHtml += " ".repeat(indentLevel * 2) + line.trim() + "\n";

      if (trimmedLine.startsWith("<") && !trimmedLine.endsWith("/>")) {
        indentLevel++;
      }
    }

    return formattedHtml.trim();
  }

  function formatCss(inputCss) {
    return inputCss.replace(/\s*([{};,:])\s*/g, "$1 ").trim();
  }

  function uglifyJs(inputJs) {
    // Implement your own JavaScript minification logic here
    // This is just a simple example
    return inputJs.replace(/\s+/g, " ");
  }
</script>

</body>
</html>
