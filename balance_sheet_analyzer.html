<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资产负债表数据分析</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status {
            text-align: center;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 500;
        }
        .loading {
            background: #e3f2fd;
            color: #1976d2;
            border: 2px solid #bbdefb;
        }
        .success {
            background: #e8f5e8;
            color: #2e7d32;
            border: 2px solid #c8e6c9;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            border: 2px solid #ffcdd2;
        }
        .controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .table-container {
            overflow-x: auto;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            background: white;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
        }
        th {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        tr:hover {
            background-color: #f8f9ff;
        }
        .numeric {
            text-align: right;
            font-family: 'Courier New', monospace;
        }
        .date-column {
            font-weight: 600;
            color: #1976d2;
        }
        .info-panel {
            background: linear-gradient(135deg, #e3f2fd, #f3e5f5);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            border-left: 5px solid #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 资产负债表数据分析</h1>
        <div id="status" class="status loading">正在加载Excel文件...</div>
        
        <div class="info-panel">
            <h3>📋 功能说明</h3>
            <p>此工具将自动读取您的Excel资产负债表文件，并按时间降序排列（最新数据在前）。支持以下功能：</p>
            <ul>
                <li>🔄 自动识别日期列并按降序排序</li>
                <li>📈 数值数据右对齐显示</li>
                <li>📊 交互式表格浏览</li>
                <li>💾 导出重新排序的数据</li>
            </ul>
        </div>

        <div class="controls">
            <button id="downloadBtn" disabled onclick="downloadSortedData()">📥 下载排序后的数据</button>
            <button id="refreshBtn" onclick="loadData()">🔄 重新加载</button>
        </div>

        <div id="tableContainer" class="table-container"></div>
    </div>

    <script>
        let sortedData = [];
        let headers = [];
        let originalFilename = '';

        async function loadData() {
            const statusDiv = document.getElementById('status');
            const tableContainer = document.getElementById('tableContainer');
            const downloadBtn = document.getElementById('downloadBtn');
            
            try {
                statusDiv.textContent = '正在读取Excel文件...';
                statusDiv.className = 'status loading';
                
                // 读取Excel文件
                const fileData = await window.fs.readFile('Balance Sheet monthly in US.xlsx');
                const workbook = XLSX.read(fileData, { type: 'array' });
                
                // 获取第一个工作表
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                
                // 转换为JSON数据
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                
                if (jsonData.length === 0) {
                    throw new Error('文件中没有找到数据');
                }
                
                // 获取表头
                headers = jsonData[0] || [];
                const dataRows = jsonData.slice(1).filter(row => row.some(cell => cell !== undefined && cell !== ''));
                
                // 寻找日期列
                let dateColumnIndex = findDateColumn(headers, dataRows);
                
                if (dateColumnIndex === -1) {
                    // 如果没有找到明确的日期列，尝试寻找包含日期信息的列
                    dateColumnIndex = findPossibleDateColumn(dataRows);
                }
                
                // 按日期列降序排序
                if (dateColumnIndex !== -1) {
                    sortedData = dataRows.sort((a, b) => {
                        const dateA = parseDate(a[dateColumnIndex]);
                        const dateB = parseDate(b[dateColumnIndex]);
                        return dateB - dateA; // 降序排列
                    });
                    statusDiv.textContent = `✅ 成功加载并按${headers[dateColumnIndex] || '第' + (dateColumnIndex + 1) + '列'}降序排序！`;
                } else {
                    // 如果没有找到日期列，按第一列排序
                    sortedData = dataRows.sort((a, b) => {
                        const valA = a[0] || '';
                        const valB = b[0] || '';
                        return String(valB).localeCompare(String(valA));
                    });
                    statusDiv.textContent = '✅ 数据已加载并按第一列降序排序（未找到明确的日期列）';
                }
                
                statusDiv.className = 'status success';
                downloadBtn.disabled = false;
                
                // 显示表格
                displayTable();
                
            } catch (error) {
                console.error('Error loading data:', error);
                statusDiv.textContent = `❌ 加载失败: ${error.message}`;
                statusDiv.className = 'status error';
                tableContainer.innerHTML = '';
                downloadBtn.disabled = true;
            }
        }
        
        function findDateColumn(headers, dataRows) {
            // 检查表头中是否有明显的日期相关词汇
            const dateKeywords = ['date', 'time', '日期', '时间', 'month', 'year', '月', '年', 'period', '期间'];
            
            for (let i = 0; i < headers.length; i++) {
                const header = String(headers[i] || '').toLowerCase();
                if (dateKeywords.some(keyword => header.includes(keyword))) {
                    return i;
                }
            }
            
            // 检查数据行中是否有日期格式的数据
            for (let colIndex = 0; colIndex < Math.min(headers.length, 5); colIndex++) {
                let dateCount = 0;
                const sampleSize = Math.min(dataRows.length, 5);
                
                for (let rowIndex = 0; rowIndex < sampleSize; rowIndex++) {
                    if (isDateLike(dataRows[rowIndex][colIndex])) {
                        dateCount++;
                    }
                }
                
                if (dateCount >= sampleSize * 0.6) { // 60%以上的数据看起来像日期
                    return colIndex;
                }
            }
            
            return -1;
        }
        
        function findPossibleDateColumn(dataRows) {
            // 尝试找到可能包含时间序列信息的列
            for (let colIndex = 0; colIndex < Math.min(5, dataRows[0]?.length || 0); colIndex++) {
                const values = dataRows.slice(0, 10).map(row => row[colIndex]).filter(v => v !== undefined);
                
                // 检查是否有年份信息
                if (values.some(v => /20\d{2}|19\d{2}/.test(String(v)))) {
                    return colIndex;
                }
            }
            
            return -1;
        }
        
        function isDateLike(value) {
            if (!value) return false;
            
            const str = String(value);
            
            // 检查各种日期格式
            const datePatterns = [
                /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/, // YYYY-MM-DD 或 YYYY/MM/DD
                /^\d{1,2}[-\/]\d{1,2}[-\/]\d{4}/, // MM-DD-YYYY 或 MM/DD/YYYY
                /^\d{4}[-\/]\d{1,2}/, // YYYY-MM 或 YYYY/MM
                /^\d{1,2}[-\/]\d{4}/, // MM-YYYY 或 MM/YYYY
                /^20\d{2}$/, // 年份
                /^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)/i, // 英文月份
            ];
            
            return datePatterns.some(pattern => pattern.test(str)) || !isNaN(Date.parse(str));
        }
        
        function parseDate(value) {
            if (!value) return new Date(0);
            
            // 如果是Excel日期序列号
            if (typeof value === 'number' && value > 25000 && value < 50000) {
                // Excel日期从1900-01-01开始计算
                return new Date((value - 25569) * 86400 * 1000);
            }
            
            const parsed = new Date(value);
            if (!isNaN(parsed.getTime())) {
                return parsed;
            }
            
            // 尝试其他格式
            const str = String(value);
            
            // YYYY-MM 格式
            const yearMonth = str.match(/^(\d{4})[-\/](\d{1,2})$/);
            if (yearMonth) {
                return new Date(parseInt(yearMonth[1]), parseInt(yearMonth[2]) - 1);
            }
            
            // 仅年份
            const year = str.match(/^(20\d{2}|19\d{2})$/);
            if (year) {
                return new Date(parseInt(year[1]), 0);
            }
            
            return new Date(0);
        }
        
        function displayTable() {
            const tableContainer = document.getElementById('tableContainer');
            
            if (sortedData.length === 0) {
                tableContainer.innerHTML = '<p>没有数据可显示</p>';
                return;
            }
            
            let tableHTML = '<table><thead><tr>';
            
            // 表头
            headers.forEach((header, index) => {
                tableHTML += `<th>${header || `列${index + 1}`}</th>`;
            });
            tableHTML += '</tr></thead><tbody>';
            
            // 数据行
            sortedData.forEach(row => {
                tableHTML += '<tr>';
                headers.forEach((_, colIndex) => {
                    const value = row[colIndex] || '';
                    const isNumeric = !isNaN(parseFloat(value)) && isFinite(value);
                    const isDate = colIndex === 0 || isDateLike(value);
                    
                    let cellClass = '';
                    if (isNumeric && !isDate) cellClass = 'numeric';
                    if (isDate) cellClass = 'date-column';
                    
                    tableHTML += `<td class="${cellClass}">${formatValue(value)}</td>`;
                });
                tableHTML += '</tr>';
            });
            
            tableHTML += '</tbody></table>';
            tableContainer.innerHTML = tableHTML;
        }
        
        function formatValue(value) {
            if (value === undefined || value === null || value === '') {
                return '';
            }
            
            // 如果是数字，格式化为货币或数字
            if (!isNaN(parseFloat(value)) && isFinite(value)) {
                const num = parseFloat(value);
                if (Math.abs(num) >= 1000) {
                    return num.toLocaleString('en-US');
                }
            }
            
            return String(value);
        }
        
        function downloadSortedData() {
            if (sortedData.length === 0) {
                alert('没有数据可下载');
                return;
            }
            
            // 创建新的工作簿
            const wb = XLSX.utils.book_new();
            
            // 准备数据（包含表头）
            const wsData = [headers, ...sortedData];
            
            // 创建工作表
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            
            // 添加工作表到工作簿
            XLSX.utils.book_append_sheet(wb, ws, 'Sorted Balance Sheet');
            
            // 生成文件名
            const filename = 'Balance_Sheet_Sorted_' + new Date().toISOString().slice(0, 10) + '.xlsx';
            
            // 下载文件
            XLSX.writeFile(wb, filename);
        }
        
        // 页面加载时自动执行
        window.addEventListener('load', loadData);
    </script>
</body>
</html>
