name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - ci
      - ci*
      - release
      - release*
  workflow_dispatch:
    inputs:
      environment:
        description: Environment
        required: true
        default: ci
        type: choice
        options:
          - ci
          - release

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && (startsWith(github.ref_name, 'ci') && 'ci' || 'release') || inputs.environment }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24

      - uses: pnpm/action-setup@v5.0.0
        with:
          version: 10

      - run: pnpm install

      - run: pnpm build

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "${{ github.ref_name }}" == ci* ]]; then
              echo "environment=ci" >> $GITHUB_OUTPUT
            else
              echo "environment=release" >> $GITHUB_OUTPUT
            fi
          else
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine project
        id: project
        run: |
          if [[ "${{ steps.env.outputs.environment }}" == ci* ]]; then
            echo "project=tools-ci" >> $GITHUB_OUTPUT
            echo "domain=tools.aceapp.dev" >> $GITHUB_OUTPUT
          else
            echo "project=tools" >> $GITHUB_OUTPUT
            echo "domain=tools.ropean.org" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./_site --project-name=${{ steps.project.outputs.project }} --branch main

      - name: Deployment summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## ✅ Deployed

          - 🚀 Deployment completed!
          - 🔧 Environment: ${{ steps.env.outputs.environment }}
          - 🌿 Branch: ${{ github.ref_name }}
          - 🌐 Domain: https://${{ steps.project.outputs.domain }}
          EOF
